services:
  univorch:
    build: .                                     # build locally from the Dockerfile (development)
    image: ghcr.io/clamaveruma/univorch:latest   # image name/tag; also used to publish to ghcr
    container_name: univorch
    ports:
      # Web GUI port — configurable via UNIVORCH_PORT env var.
      # Default: 8080. Override: UNIVORCH_PORT=9090 ./univorch.sh start
      - "${UNIVORCH_PORT:-8080}:8080"
    volumes:
      # --- CRITICAL ---
      # This volume holds the TinyDB database (a single JSON file).
      # Without this mount, all data is lost every time the container
      # is recreated. Never remove this volume while the service is in use.
      - univorch_data:/data
    environment:
      UNIVORCH_PORT:    "${UNIVORCH_PORT:-8080}"
      UNIVORCH_DB_PATH: /data/univorch.json
    restart: unless-stopped
    # Liveness check via the REST daemon's /health endpoint. Docker marks the
    # container unhealthy if the daemon stops responding; `docker compose ps`
    # shows the status. Sprint 3.1.c.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/v1/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

# Named volume managed by Docker — survives container recreation.
# To inspect: docker volume inspect univorch_univorch_data
# To back up: copy the JSON file from the volume to a safe location.
volumes:
  univorch_data:
    driver: local
