# yaml-language-server: $schema=../../docs/schema/definition.schema.json
#
# Teaching demo — a subject definition for the layer-2 teaching app.
# Load with:  teach load-subject demo/teaching/subject-redes.yml /
#
# A subject is a folder marked, in its opaque `metadata`, with
# `kind: subject` and a `desktop` (the list of templates that make up
# one student's set of machines). The core stores `metadata` and never
# interprets it (DEC-038); only the teaching layer reads it.

kind: definition
version: "1"

redes-2026/:
  description: "Computer Networks — Fall 2026"
  metadata:
    kind: subject
    desktop: [workstation, server, router, firewall, switch, client]

  define hypervisors:
    mock01:
      type: mock
      description: "In-memory mock hypervisor for the demo"

  define templates:
    workstation: { use hypervisor: mock01, base_vm: linux-base, cpu: 2, memory_mb: 2048 }
    server:      { use hypervisor: mock01, base_vm: linux-base, cpu: 4, memory_mb: 4096 }
    router:      { use hypervisor: mock01, base_vm: linux-base, cpu: 1, memory_mb: 1024 }
    firewall:    { use hypervisor: mock01, base_vm: linux-base, cpu: 1, memory_mb: 1024 }
    switch:      { use hypervisor: mock01, base_vm: linux-base, cpu: 1, memory_mb: 512 }
    client:      { use hypervisor: mock01, base_vm: linux-base, cpu: 2, memory_mb: 2048 }
