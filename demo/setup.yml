# yaml-language-server: $schema=../docs/schema/definition.schema.json
#
# UnivOrch demo — Sprint 2 (Pieza 1.A onwards)
# Relative definition: load with `load demo/setup.yml [/destination]`.
#
# Vocabulary:
#   - `define hypervisors:`         declares a hypervisor by name
#   - `define templates:`   declares a VM template by name
#   - `import: [name, ...]`         brings declared resources down from the parent
#   - `use hypervisor: name`        references a declared hypervisor
#   - `use template: name`          references a declared template (the Resolver
#                                   substitutes the template's fields at access)
#
# Notes:
#   - Folder keys end in '/'; VM keys do not.
#   - The destination's own properties are NOT modified by `load`. Resources and
#     `import` live inside a folder, never at the document root.
#   - A subfolder only imports what IT uses directly. A template carries its
#     own lexical environment (closure): if `linux-vm` is defined in /lab and
#     uses `mock01` internally, importing `linux-vm` into /lab/networks is
#     enough — the hypervisor `mock01` is resolved from where the template
#     lives, not from where it is used.

kind: definition
version: "1"

lab/:
  description: "Computer Science Lab"

  define hypervisors:
    mock01:
      type: mock
      description: "In-memory mock hypervisor for the demo"

  define templates:
    linux-vm:
      description: "Standard student Linux workstation"
      use hypervisor: mock01
      base_vm: linux-base
      cpu: 2
      memory_mb: 2048
      disk_gb: 20

  networks/:
    description: "Computer Networks — Fall 2026"
    import: [linux-vm]
    student01: { use template: linux-vm }
    student02: { use template: linux-vm }
    student03: { use template: linux-vm, cpu: 4 }
