/* === tokens/fonts.css === */
/* ==========================================================================
   UnivOrch — Webfonts
   Material Design ships on Roboto; the product renders through Quasar/NiceGUI
   which uses Roboto as its system typeface. We honour that. Roboto Mono backs
   the CLI / YAML / code surfaces, which are central to a CLI-first orchestrator.
   Loaded from Google Fonts (the canonical source for both families).
   ========================================================================== */



/* Material Symbols Rounded — Quasar/NiceGUI's icon system (the product's
   native iconography). Used by IconButton, StateChip, AppBar, etc. */


/* Material Symbols base class */
.material-symbols-rounded {
  font-family: 'Material Symbols Rounded';
  font-weight: normal;
  font-style: normal;
  display: inline-block;
  line-height: 1;
  text-transform: none;
  letter-spacing: normal;
  white-space: nowrap;
  word-wrap: normal;
  direction: ltr;
  -webkit-font-feature-settings: 'liga';
  -webkit-font-smoothing: antialiased;
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
.material-symbols-rounded.fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

/* === tokens/colors.css === */
/* ==========================================================================
   UnivOrch — Color tokens
   --------------------------------------------------------------------------
   Built on the Material Design 3 baseline (the product is "Diseño basado en
   Google materials", rendered via Quasar/NiceGUI). The baseline M3 scheme is
   a violet primary — which also gives us the requested "gris claro con un
   toque morado sutil": surfaces are near-white greys tinted toward the
   primary violet.

   The DISTINCTIVE BRAND MARK is the double rule: two thick stacked lines, one
   reddish-orange and one yellowish-orange, used as separators / signatures.
   Those two oranges are first-class brand tokens (--brand-line-*).

   Semantic state colors mirror the product code (web app.py / cli app.py):
     provisioned  □  grey      (definition exists, no VM)
     deployed     ■  primary   (VM exists; intentionally NOT green — green is
                                reserved for runtime "running")
     broken       ✗  error/red
     unreachable  ▲  warning/amber
     folders         blue      (ls-style dircolors)
   ========================================================================== */

:root {
  /* ---- Violet — accent: the "deployed/active" state + surface tint ------- */
  --violet-10: #21005d;
  --violet-20: #381e72;
  --violet-30: #4f378b;
  --violet-40: #6750a4;   /* primary */
  --violet-50: #7f67be;
  --violet-60: #9a82db;
  --violet-80: #d0bcff;
  --violet-90: #eaddff;   /* primary container */
  --violet-95: #f6edff;
  --violet-99: #fffbfe;

  /* ---- Primary (warm orange) — the brand leads with orange --------------- */
  --orange-10: #3a0d00;
  --orange-20: #5e1c00;
  --orange-30: #8a2f0e;
  --orange-40: #c8451f;   /* primary surface (white text ~5.8:1) */
  --orange-50: #e8552f;   /* brand warm (vivid) */
  --orange-60: #f4733f;
  --orange-80: #ffb59a;
  --orange-90: #ffdbcb;   /* primary container */
  --orange-95: #ffede6;

  --color-primary:            var(--orange-40);
  --color-primary-hover:      var(--orange-30);
  --color-primary-pressed:    var(--orange-20);
  --color-on-primary:         #ffffff;
  --color-primary-container:  var(--orange-90);
  --color-on-primary-container: var(--orange-10);

  /* ---- Secondary (warm gold accent) -------------------------------------- */
  --color-secondary:           #7a5900;
  --color-on-secondary:        #ffffff;
  --color-secondary-container: #ffe2a3;
  --color-on-secondary-container: #261a00;

  /* ---- Brand signature — the double rule --------------------------------- */
  --brand-line-warm:  #e8552f;   /* reddish-orange  (top rule) */
  --brand-line-gold:  #f4a937;   /* yellowish-orange (bottom rule) */
  --brand-line-warm-strong: #c8431f;
  --brand-line-gold-strong: #dd9012;

  /* ---- Surfaces — light grey tinted toward violet ------------------------ */
  --color-background:        #f5f2f9;   /* app canvas: light grey, subtle purple */
  --color-surface:           #fdfbff;   /* cards / sheets */
  --color-surface-dim:       #ded8e1;
  --color-surface-bright:    #fdfbff;
  --color-surface-container-lowest: #ffffff;
  --color-surface-container-low:    #f7f2fa;
  --color-surface-container:        #f2ecf4;
  --color-surface-container-high:   #ece6ee;
  --color-surface-container-highest:#e6e0e9;
  --color-surface-variant:   #e7e0ec;   /* chips, inputs, tonal fills */
  --color-on-surface-variant:#49454f;

  /* ---- Text / on-surface ------------------------------------------------- */
  --color-on-surface:        #1c1b1f;   /* primary text */
  --color-on-surface-muted:  #49454f;   /* secondary text */
  --color-on-surface-faint:  #79747e;   /* hints, captions, disabled label */
  --color-on-primary-dark:   #ffffff;

  /* ---- Outline / dividers ------------------------------------------------ */
  --color-outline:           #79747e;
  --color-outline-variant:   #cac4d0;   /* hairline dividers */

  /* ---- Semantic state colors (descriptor states) ------------------------- */
  --state-provisioned:        #79747e;  /* grey  □ */
  --state-provisioned-bg:     #ece6ee;
  --state-deployed:           var(--violet-40);   /* violet ■ (deployed = active) */
  --state-deployed-bg:        var(--violet-90);
  --state-broken:             #ba1a1a;  /* red   ✗ */
  --state-broken-bg:          #ffdad6;
  --state-unreachable:        #9a6700;  /* amber ▲ (accessible text tone) */
  --state-unreachable-bg:     #ffeccf;

  --color-error:             #ba1a1a;
  --color-on-error:          #ffffff;
  --color-error-container:   #ffdad6;
  --color-on-error-container:#410002;
  --color-warning:           #9a6700;
  --color-success:           #2e7d32;   /* runtime "running" / job completed */

  /* ---- Folder accent (tree, ls-style) ------------------------------------ */
  --color-folder:            #1565c0;   /* blue */
  --color-folder-container:  #d6e3ff;

  /* ---- Terminal / console palette (CLI surface) -------------------------- */
  --term-bg:        #1c1b22;
  --term-surface:   #26242e;
  --term-fg:        #e6e1e9;
  --term-dim:       #938f99;
  --term-prompt:    #d0bcff;   /* violet prompt */
  --term-folder:    #82aaff;   /* blue */
  --term-green:     #7ee787;   /* job ok */
  --term-red:       #ff7a73;   /* broken / fail */
  --term-yellow:    #f4c66b;   /* unreachable */

  /* ---- Scrim / overlay --------------------------------------------------- */
  --color-scrim:     rgba(28, 27, 31, 0.4);
}

/* === tokens/typography.css === */
/* ==========================================================================
   UnivOrch — Typography tokens
   --------------------------------------------------------------------------
   Material Design 3 type scale on Roboto (Quasar's typeface). Roboto Mono for
   code / YAML / CLI. Quasar class names map to these roles:
     text-h5  -> headline-small   text-h6 -> title-large
     text-subtitle2 -> title-small   text-body1 -> body-large
     text-caption  -> body-small / label
   ========================================================================== */

:root {
  /* ---- Families ---------------------------------------------------------- */
  --font-sans: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'Roboto Mono', ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;

  /* ---- Weights ----------------------------------------------------------- */
  --weight-light:   300;
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-bold:    700;

  /* ---- M3 type scale (size / line-height / tracking) --------------------- */
  /* Display */
  --type-display-large-size:   57px;
  --type-display-large-line:   64px;
  --type-display-large-track:  -0.25px;

  /* Headline */
  --type-headline-large-size:  32px;
  --type-headline-large-line:  40px;
  --type-headline-medium-size: 28px;
  --type-headline-medium-line: 36px;
  --type-headline-small-size:  24px;   /* text-h5 */
  --type-headline-small-line:  32px;

  /* Title */
  --type-title-large-size:     22px;   /* text-h6 */
  --type-title-large-line:     28px;
  --type-title-medium-size:    16px;
  --type-title-medium-line:    24px;
  --type-title-medium-track:   0.15px;
  --type-title-small-size:     14px;   /* text-subtitle2 */
  --type-title-small-line:     20px;
  --type-title-small-track:    0.1px;

  /* Body */
  --type-body-large-size:      16px;   /* text-body1 */
  --type-body-large-line:      24px;
  --type-body-large-track:     0.5px;
  --type-body-medium-size:     14px;
  --type-body-medium-line:     20px;
  --type-body-medium-track:    0.25px;
  --type-body-small-size:      12px;   /* text-caption */
  --type-body-small-line:      16px;
  --type-body-small-track:     0.4px;

  /* Label (buttons, chips, badges) */
  --type-label-large-size:     14px;
  --type-label-large-line:     20px;
  --type-label-large-track:    0.1px;
  --type-label-medium-size:    12px;
  --type-label-medium-line:    16px;
  --type-label-medium-track:   0.5px;
  --type-label-small-size:     11px;
  --type-label-small-line:     16px;
  --type-label-small-track:    0.5px;

  /* Mono (CLI / YAML / code) */
  --type-mono-size:            13px;
  --type-mono-line:            20px;
}

/* === tokens/spacing.css === */
/* ==========================================================================
   UnivOrch — Spacing tokens
   --------------------------------------------------------------------------
   Material's 8dp grid (with a 4dp half-step), matching the Quasar spacing
   classes the product uses (q-*-xs=4, sm=8, md=16, lg=24, xl=32).
   ========================================================================== */

:root {
  --space-0:   0;
  --space-xxs: 2px;
  --space-xs:  4px;    /* q-*-xs */
  --space-sm:  8px;    /* q-*-sm */
  --space-md:  16px;   /* q-*-md  (default gutter) */
  --space-lg:  24px;   /* q-*-lg */
  --space-xl:  32px;   /* q-*-xl */
  --space-2xl: 48px;
  --space-3xl: 64px;

  /* ---- Layout rails ------------------------------------------------------ */
  --layout-header-height: 64px;   /* Material top app bar */
  --layout-gutter:        16px;
  --layout-page-max:      1280px;
  --layout-sidebar-width: 320px;
}

/* === tokens/elevation.css === */
/* ==========================================================================
   UnivOrch — Shape & Elevation tokens
   --------------------------------------------------------------------------
   Material Design 3 corner radii + the 5-level elevation shadow system.
   M3 uses umbra+penumbra dual shadows; values below are the standard dp set.
   ========================================================================== */

:root {
  /* ---- Corner radii (M3 shape scale) ------------------------------------- */
  --radius-none:  0;
  --radius-xs:    4px;
  --radius-sm:    8px;     /* buttons, text fields */
  --radius-md:    12px;    /* cards */
  --radius-lg:    16px;    /* large cards, sheets */
  --radius-xl:    28px;    /* dialogs, FAB */
  --radius-full:  999px;   /* chips, badges, avatars, pills */

  /* ---- Elevation (M3 / Quasar shadow dp levels) -------------------------- */
  --elevation-0: none;
  --elevation-1:
    0 1px 2px 0 rgba(0, 0, 0, 0.30),
    0 1px 3px 1px rgba(0, 0, 0, 0.15);
  --elevation-2:
    0 1px 2px 0 rgba(0, 0, 0, 0.30),
    0 2px 6px 2px rgba(0, 0, 0, 0.15);
  --elevation-3:
    0 4px 8px 3px rgba(0, 0, 0, 0.15),
    0 1px 3px 0 rgba(0, 0, 0, 0.30);
  --elevation-4:
    0 6px 10px 4px rgba(0, 0, 0, 0.15),
    0 2px 3px 0 rgba(0, 0, 0, 0.30);
  --elevation-5:
    0 8px 12px 6px rgba(0, 0, 0, 0.15),
    0 4px 4px 0 rgba(0, 0, 0, 0.30);

  /* ---- Focus ring -------------------------------------------------------- */
  --focus-ring: 0 0 0 3px color-mix(in srgb, var(--color-primary) 40%, transparent);

  /* ---- Motion (Material easing & durations) ------------------------------ */
  --ease-standard:      cubic-bezier(0.2, 0, 0, 1);   /* @kind other */
  --ease-emphasized:    cubic-bezier(0.2, 0, 0, 1);   /* @kind other */
  --ease-decelerate:    cubic-bezier(0, 0, 0, 1);     /* @kind other */
  --ease-accelerate:    cubic-bezier(0.3, 0, 1, 1);   /* @kind other */
  --duration-short:     150ms;   /* @kind other */
  --duration-medium:    250ms;   /* @kind other */
  --duration-long:      400ms;   /* @kind other */

  /* ---- Brand double-rule geometry (the signature separator) -------------- */
  --rule-thickness: 4px;   /* each of the two stacked lines */
  --rule-gap:       3px;   /* gap between the warm and gold lines */
}

/* === tokens/base.css === */
/* ==========================================================================
   UnivOrch — Base & brand utilities
   --------------------------------------------------------------------------
   Light resets that bind the tokens to real elements, plus the signature
   "double rule" brand mark as a reusable utility. Imported by styles.css after
   the tokens so the custom properties are available.
   ========================================================================== */

*,
*::before,
*::after { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--type-body-large-size);
  line-height: var(--type-body-large-line);
  color: var(--color-on-surface);
  background: var(--color-background);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ---- Type role utilities ------------------------------------------------- */
.u-headline-large { font: var(--weight-regular) var(--type-headline-large-size)/var(--type-headline-large-line) var(--font-sans); letter-spacing: 0; margin: 0; }
.u-headline-small { font: var(--weight-regular) var(--type-headline-small-size)/var(--type-headline-small-line) var(--font-sans); letter-spacing: 0; margin: 0; }
.u-title-large    { font: var(--weight-medium)  var(--type-title-large-size)/var(--type-title-large-line) var(--font-sans); margin: 0; }
.u-title-medium   { font: var(--weight-medium)  var(--type-title-medium-size)/var(--type-title-medium-line) var(--font-sans); letter-spacing: var(--type-title-medium-track); margin: 0; }
.u-body-large     { font: var(--weight-regular) var(--type-body-large-size)/var(--type-body-large-line) var(--font-sans); letter-spacing: var(--type-body-large-track); margin: 0; }
.u-body-medium    { font: var(--weight-regular) var(--type-body-medium-size)/var(--type-body-medium-line) var(--font-sans); letter-spacing: var(--type-body-medium-track); margin: 0; }
.u-label          { font: var(--weight-medium)  var(--type-label-large-size)/var(--type-label-large-line) var(--font-sans); letter-spacing: var(--type-label-large-track); margin: 0; }
.u-mono           { font: var(--weight-regular) var(--type-mono-size)/var(--type-mono-line) var(--font-mono); }

/* ==========================================================================
   THE BRAND MARK — double rule
   Two thick stacked lines: a reddish-orange one above a yellowish-orange one.
   Use as a section separator, header underline, or standalone signature.

   Horizontal:  <div class="brand-rule"></div>
   Short tab:   <div class="brand-rule brand-rule--tab"></div>
   Vertical:    <div class="brand-rule brand-rule--vertical"></div>
   ========================================================================== */
.brand-rule {
  --_warm: var(--brand-line-warm);
  --_gold: var(--brand-line-gold);
  display: block;
  width: 100%;
  height: calc(var(--rule-thickness) * 2 + var(--rule-gap));
  background-image:
    linear-gradient(var(--_warm), var(--_warm)),
    linear-gradient(var(--_gold), var(--_gold));
  background-repeat: no-repeat;
  background-size:
    100% var(--rule-thickness),
    100% var(--rule-thickness);
  background-position:
    top left,
    bottom left;
  border-radius: var(--radius-full);
}

/* A short signature tab (e.g. above a section title) */
.brand-rule--tab { width: 48px; }

/* Vertical variant — two side-by-side bars (e.g. left edge of a hero panel) */
.brand-rule--vertical {
  width: calc(var(--rule-thickness) * 2 + var(--rule-gap));
  height: 100%;
  background-size:
    var(--rule-thickness) 100%,
    var(--rule-thickness) 100%;
  background-position:
    left top,
    right top;
}

/* === page === */

  :root { --q-primary: #c8451f; --q-negative: #ba1a1a; --q-positive: #2e7d32; }
  html, body { margin: 0; padding: 0; background: var(--color-background); }
  .uo-svgico { display: inline-block; vertical-align: middle; flex: none; fill: currentColor; }
  #app { min-height: 100vh; }
  .uo-app { min-height: 100vh; display: flex; flex-direction: column;
    font-family: var(--font-sans); color: var(--color-on-surface); }

  .uo-appbar { height: 60px; flex: none; background: var(--color-primary); color: #fff;
    display: flex; align-items: center; justify-content: space-between; padding: 0 16px; box-shadow: var(--elevation-2); }
  .uo-brand { display: flex; align-items: center; gap: 10px; }
  .uo-brand img { height: 30px; display: block; }
  .uo-brand span { font-size: 20px; font-weight: 500; letter-spacing: 0.2px; }
  .uo-user { display: inline-flex; align-items: center; gap: 8px; padding-right: 8px; font-weight: 500; font-size: 15px; }

  .uo-deskpage { flex: 1; display: flex; flex-direction: column; align-items: center; gap: var(--space-lg);
    padding: var(--space-xl) var(--space-lg); max-width: var(--layout-page-max, 1280px); width: 100%; margin: 0 auto; box-sizing: border-box; }
  .uo-titleblock { align-self: flex-start; display: flex; flex-direction: column; gap: 8px; }
  .uo-deskhead { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; white-space: nowrap; }
  .uo-headline { font-size: 24px; font-weight: 500; white-space: nowrap; }
  .uo-faint { color: var(--color-on-surface-faint); font-size: 14px; }
  .uo-mono { font-family: var(--font-mono); }
  .uo-brand-rule { height: 4px; border-radius: var(--radius-full);
    background: linear-gradient(90deg, var(--brand-line-warm) 0 50%, var(--brand-line-gold) 50% 100%); }

  /* desks */
  .uo-desks { display: flex; flex-direction: column; gap: var(--space-xl); align-items: center; width: 100%; }
  .uo-deskrow { width: 100%; }
  .uo-units { display: flex; gap: 14px; align-items: flex-end; justify-content: center; padding: 0 40px; }
  .uo-unit { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
    padding: 8px 10px 2px; border-radius: var(--radius-lg); background: transparent; transition: background .15s; width: 130px; flex: none; }
  .uo-unit:hover { background: var(--color-surface-container); }
  .uo-unit--sel { background: var(--color-primary-container) !important; }
  .uo-unit-name { font-family: var(--font-mono); font-weight: 500; font-size: 13px; color: var(--color-on-surface); white-space: nowrap; }
  .uo-unit-ip { font-family: var(--font-mono); font-size: 12px; white-space: nowrap; }
  .uo-desk { position: relative; height: 50px; width: 100%; }
  .uo-desk-top { position: absolute; top: 0; left: 0; right: 0; height: 15px; background: #7B1015; border-radius: 7px; box-shadow: var(--elevation-2); }
  .uo-desk-leg { position: absolute; top: 13px; width: 15px; height: 36px; background: #7B1015; border-radius: 0 0 4px 4px; }
  .uo-desk-leg--l { left: 30px; }
  .uo-desk-leg--r { right: 30px; }

  /* pills */

  <script>
/* UnivOrch end-user desk — Vue 3 + Quasar.  Port of the React user kit: the
   student's machines sit on desks (big illustrated PC per machine), with a
   friendly status pill and simple power / deploy actions on the selected one. */
(function () {
  const { createApp, ref, reactive, computed, onMounted, onUnmounted, h } = Vue;
  const vmStatusSvg = window.vmStatusSvg;
  const ICONS = window.UO_ICONS;

  function mk(name, label, ip, os, state, runtime) { return { name, label, ip, os, state, runtime }; }
  const SEED = [
    mk('ws-ana-1', 'Workstation 1', '10.0.30.11', 'Ubuntu 22.04', 'deployed', 'running'),
    mk('ws-ana-2', 'Workstation 2', '10.0.30.12', 'Ubuntu 22.04', 'deployed', 'stopped'),
    mk('gpu-lab', 'GPU lab', '10.0.30.20', 'CUDA box', 'deployed', 'paused'),
    mk('build-box', 'Build box', '10.0.30.30', 'Debian 12', 'unreachable', null),
    mk('ws-ana-3', 'Workstation 3', '10.0.30.13', 'Ubuntu 22.04', 'deployed', 'running'),
    mk('db-test', 'DB test', '10.0.30.41', 'PostgreSQL', 'deployed', 'stopped'),
    mk('web-staging', 'Web staging', '10.0.30.50', 'Nginx', 'provisioned', null),
    mk('sandbox', 'Sandbox', '10.0.30.61', 'Alpine', 'deployed', 'running'),
    mk('old-vm', 'Old VM', '10.0.30.70', 'Debian 11', 'broken', null),
    mk('render-1', 'Render node', '10.0.30.80', 'CUDA box', 'provisioned', null),
  ];
  const MACHINES0 = {}; SEED.forEach((m) => { MACHINES0[m.name] = m; });
  const ORDER = Object.keys(MACHINES0);

  const TONE = {
    success: ['#c8e6c9', '#1b5e20'],
    neutral: ['var(--color-surface-container-highest)', 'var(--color-on-surface-muted)'],
    warning: ['var(--state-unreachable-bg)', 'var(--state-unreachable)'],
    error: ['var(--color-error-container)', 'var(--color-on-error-container)'],
  };
  function friendly(m) {
    if (m.state === 'unreachable') return { txt: 'Unavailable', tone: 'warning' };
    if (m.state === 'broken') return { txt: 'Error', tone: 'error' };
    if (m.state === 'provisioned') return { txt: 'Provisioned', tone: 'neutral' };
    if (m.runtime === 'running') return { txt: 'On', tone: 'success' };
    if (m.runtime === 'paused') return { txt: 'Paused', tone: 'neutral' };
    return { txt: 'Off', tone: 'neutral' };
  }
  // IP slot: always show the address — provisioned machines already have one
  // assigned; the status pill conveys that the VM is not yet created.
  const addrText = (m) => m.ip;

  function actionsFor(m) {
    if (m.state === 'unreachable') return [];
    if (m.state === 'broken') return [{ label: 'Undeploy', icon: 'undo', op: 'undeploy', variant: 'outlined' }];
    if (m.state === 'provisioned') return [{ label: 'Deploy', icon: 'rocket_launch', op: 'deploy', variant: 'filled' }];
    const a = [];
    if (m.runtime === 'running') a.push(
      { label: 'Connect', icon: 'cast', op: 'connect', variant: 'filled' },
      { label: 'Restart', icon: 'restart_alt', op: 'restart', variant: 'tonal' },
      { label: 'Power off', icon: 'power_settings_new', op: 'off', variant: 'outlined' });
    else if (m.runtime === 'paused') a.push(
      { label: 'Resume', icon: 'play_arrow', op: 'on', variant: 'filled' },
      { label: 'Power off', icon: 'power_settings_new', op: 'off', variant: 'outlined' });
    else a.push({ label: 'Power on', icon: 'power_settings_new', op: 'on', variant: 'filled' });
    a.push({ label: 'Undeploy', icon: 'undo', op: 'undeploy', variant: 'text' });
    return a;
  }

  const app = createApp({
    setup() {
      const machines = reactive(JSON.parse(JSON.stringify(MACHINES0)));
      const sel = ref('ws-ana-1');
      const toast = ref(null);
      const perDesk = ref(6);
      const wrapRef = ref(null);
      let ro = null, toastTimer = null;

      const m = computed(() => machines[sel.value]);
      const acts = computed(() => actionsFor(m.value));
      const desks = computed(() => {
        const out = [];
        for (let i = 0; i < ORDER.length; i += perDesk.value) out.push(ORDER.slice(i, i + perDesk.value));
        return out;
      });

      function act(op, name) {
        name = name || sel.value;
        if (op === 'connect') {
          toast.value = 'Opening a console to ' + name + '…';
          clearTimeout(toastTimer); toastTimer = setTimeout(() => { toast.value = null; }, 1800);
          return;
        }
        const r = machines[name];
        if (op === 'deploy') { r.state = 'deployed'; r.runtime = 'stopped'; }
        if (op === 'undeploy') { r.state = 'provisioned'; r.runtime = null; }
        if (op === 'on') { r.state = 'deployed'; r.runtime = 'running'; }
        if (op === 'off') { r.runtime = 'stopped'; }
        if (op === 'restart') { r.runtime = 'running'; }
      }

      onMounted(() => {
        const el = wrapRef.value; if (!el || !window.ResizeObserver) return;
        const update = () => { perDesk.value = Math.max(1, Math.floor((el.clientWidth - 70) / 144)); };
        ro = new ResizeObserver(update); ro.observe(el); update();
      });
      onUnmounted(() => { if (ro) ro.disconnect(); });

      return { machines, sel, toast, wrapRef, m, acts, desks, friendly, addrText, act, total: ORDER.length };

          </div>

          <div ref="wrapRef" class="uo-desks">
            <desk-row v-for="(ids, i) in desks" :key="i" :ids="ids" :machines="machines" :sel="sel" @select="sel = $event" />
          </div>

          <q-card flat bordered class="uo-detail-card uo-deskcard">
            <div class="row items-center" style="gap:16px">
              <vm-icon :state="m.state" :runtime="m.runtime" :size="52" />
              <div style="flex:1;min-width:0">
                <div class="uo-title-lg">{{ m.label }}</div>
                <div class="uo-faint uo-mono">{{ m.name }} · {{ m.os }}</div>
              </div>
              <badge-pill :tone="friendly(m).tone">{{ friendly(m).txt }}</badge-pill>
            </div>
            <div class="uo-kv2">
              <span class="uo-faint">Address</span>
              <span class="uo-mono">{{ addrText(m) }}</span>
            </div>
            <div class="uo-deskacts">
              <div v-if="acts.length === 0" class="uo-faint" style="display:flex;align-items:center;gap:8px">
                <m-icon name="info" :size="20" style="color:var(--state-unreachable)" />
                This machine is unavailable — contact your administrator.
              </div>
              <template v-else>
                <q-btn v-for="a in acts" :key="a.op" no-caps
                  :unelevated="a.variant === 'filled' || a.variant === 'tonal'"
                  :outline="a.variant === 'outlined'" :flat="a.variant === 'text'"
                  :color="a.variant === 'filled' ? 'primary' : (a.variant === 'tonal' ? undefined : 'primary')"
                  :class="{ 'uo-btn-tonal': a.variant === 'tonal' }"
                  @click="act(a.op)">
                  <m-icon :name="a.icon" :size="18" class="q-mr-xs" />{{ a.label }}
                </q-btn>
              </template>
            </div>
          </q-card>
        </div>

        <transition name="uo-toast">
          <div v-if="toast" class="uo-toast">{{ toast }}</div>
        </transition>
      </div>
    `,
  });

  app.component('m-icon', {
    props: { name: String, size: { type: Number, default: 0 } },
    setup(props) {
      return () => {
        const s = props.size || 24;
        return h('svg', { class: 'uo-svgico', width: s, height: s, viewBox: '0 0 24 24', fill: 'currentColor', 'aria-hidden': 'true' },
          [h('path', { d: ICONS[props.name] || '' })]);
      };
    },
  });
  app.component('brand-rule', {
    props: { length: { type: Number, default: 120 } },
    template: `<div class="uo-brand-rule" :style="{ width: length + 'px' }"></div>`,
  });
  app.component('vm-icon', {
    props: { state: String, runtime: String, size: { type: Number, default: 22 } },
    setup(props) {
      const svg = computed(() => vmStatusSvg(props.state, props.runtime, props.size));
      return () => h('span', { class: 'uo-vm-icon', style: { lineHeight: 0 }, innerHTML: svg.value });
    },
  });
  app.component('badge-pill', {
    props: { tone: { type: String, default: 'neutral' } },
    setup(props, { slots }) {
      const c = computed(() => TONE[props.tone] || TONE.neutral);
      return () => h('span', { class: 'uo-pill', style: { background: c.value[0], color: c.value[1] } }, slots.default ? slots.default() : []);
    },
  });
  app.component('desk-unit', {
    props: { m: Object, selected: Boolean },
    emits: ['select'],
    setup(props, { emit }) {
      return () => {
        const f = friendly(props.m);
        return h('div', {
          class: ['uo-unit', { 'uo-unit--sel': props.selected }],
          onClick: () => emit('select', props.m.name),
        }, [
          h('div', { class: 'uo-unit-name' }, props.m.name),
          h('div', { class: 'uo-unit-ip', style: { color: props.m.runtime === 'running' ? 'var(--color-on-surface-muted)' : 'var(--color-on-surface-faint)' } }, addrText(props.m)),
          h('span', { class: 'uo-pill', style: { background: (TONE[f.tone] || TONE.neutral)[0], color: (TONE[f.tone] || TONE.neutral)[1] } }, f.txt),
          h('span', { class: 'uo-vm-icon', style: { lineHeight: 0 }, innerHTML: vmStatusSvg(props.m.state, props.m.runtime, 72) }),
        ]);
      };
    },
  });
  app.component('desk-row', {
    props: { ids: Array, machines: Object, sel: String },
    emits: ['select'],
    template: `
      <div class="uo-deskrow">
        <div class="uo-units">
          <desk-unit v-for="id in ids" :key="id" :m="machines[id]" :selected="sel === id" @select="$emit('select', $event)" />
        </div>
        <div class="uo-desk">
          <div class="uo-desk-top"></div>
          <div class="uo-desk-leg uo-desk-leg--l"></div>
          <div class="uo-desk-leg uo-desk-leg--r"></div>
        </div>
      </div>
    `,
  });

  app.use(window.Quasar);
  app.mount('#app');
})();

  </script>
</body>
</html>
